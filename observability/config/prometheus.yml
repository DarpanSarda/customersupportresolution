# Prometheus Configuration
# Scrapes metrics from the application

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'customer-support-resolution'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files (optional)
# rule_files:
#   - 'alerts.yml'

scrape_configs:
  # Application metrics
  - job_name: 'customer-support-resolution'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
